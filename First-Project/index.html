<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- styles -->
    <link rel="stylesheet" href="./fonts/fonts.css" />
    <link rel="stylesheet" href="./styles/global.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <!-- styles -->
    <title>Furniro</title>
</head>

<body>
    <header class="header">
        <a class="header__logo" href="#">
            <img src="./images/Meubel House_Logos.png" alt="Логотип компании Lolito" class="header__logo-image" />
            <h1 class="header__logo-name">Furniro</h1>
        </a>
        <nav class="header__menu">
            <ul class="header__menu-list">
                <li class="header__menu-item">
                    <a class="header__menu-link" href="#">Home</a>
                </li>
                <li class="header__menu-item">
                    <a class="header__menu-link" href="#">Shop</a>
                </li>
                <li class="header__menu-item">
                    <a class="header__menu-link" href="#">About</a>
                </li>
                <li class="header__menu-item">
                    <a class="header__menu-link" href="#">Contact</a>
                </li>
            </ul>
        </nav>
        <div class="header__actions">
            <ul class="header__actions-list">
                <li class="header__actions-item">
                    <a class="header__actions-link">
                        <img src="./images/account-icon.png" alt="Account" class="header__actions-icon" />
                    </a>
                </li>

                <li class="header__actions-item">
                    <a class="header__actions-link" href="#">
                        <img src="./images/icons_search.png" alt="Search" class="header__actions-icon" />
                    </a>
                </li>

                <li class="header__actions-item">
                    <a class="header__actions-link" href="#">
                        <img src="./images/icons_heart.png" alt="Favorite" class="header__actions-icon" />
                    </a>
                </li>

                <li class="header__actions-item">
                    <a class="header__actions-link" href="#">
                        <img src="./images/shopping-icon.png" alt="Shopping cart" class="header__actions-icon" />
                    </a>
                </li>
            </ul>
        </div>
    </header>
    <main>
        <section class="banner">
            <div class="banner__background">
                <div class="banner__content">
                    <p class="banner__pre-title">New Arrival</p>
                    <h2 class="banner__title">Discover Our <br> New Collection</h2>
                    <p class="banner__description">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Ut <br> elit
                        tellus, luctus nec ullamcorper mattis.</p>
                    <button class="banner__btn">Buy Now</button>
                </div>
            </div>
        </section>
        <section class="assortment"></section>
        <section class="products"></section>
        <section class="inspiration"></section>
        <section class="furniture"></section>
    </main>
    <footer class="footer"></footer>
</body>

</html>
